<style>
  :root {
    --bg: #f5f5f5;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'ES Peak', -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body { min-height: 100vh; padding: 28px 32px 96px; }
  .wrap { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 32px; }
  h1 { margin: 0 0 28px; line-height: 0; }
  h1 a { display: block; }
  .header-img { display: block; width: 100%; height: auto; transition: opacity 0.15s; }
  h1 a:hover .header-img { opacity: 0.85; }
  .intro { font-size: 16px; line-height: 1.5; color: var(--soft); max-width: 520px; margin-bottom: 28px; }
  .intro a {
    color: var(--soft); text-decoration: underline; text-decoration-color: var(--link-underline);
    text-underline-offset: 3px; text-decoration-thickness: 1px;
  }
  .intro a:hover { color: var(--ink); text-decoration-color: var(--ink); }

  .tabs { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 8px; padding-bottom: 4px; }
  .tab {
    appearance: none; background: none; border: none; padding: 0; cursor: pointer;
    font-family: inherit; font-size: 16px; font-weight: 500; color: var(--soft);
    letter-spacing: -0.005em;
    text-decoration: underline; text-decoration-color: transparent;
    text-underline-offset: 5px; text-decoration-thickness: 1px;
    transition: color 0.15s, text-decoration-color 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); text-decoration-color: var(--ink); }

  .section-title { font-size: 18px; font-weight: 500; margin-bottom: 32px; margin-top: 56px; }

  .feed { display: flex; flex-direction: column; }

  .album {
    padding: 32px 0;
    border-top: 1px solid var(--rule);
    opacity: 0;
    transform: translateY(4px);
    animation: rise 0.4s ease-out forwards;
    display: grid;
    grid-template-columns: 191px 1fr;
    gap: 28px;
    align-items: start;
  }
  .album:first-child { border-top: none; padding-top: 0; }
  .album:nth-child(1) { animation-delay: 0.04s; }
  .album:nth-child(2) { animation-delay: 0.08s; }
  .album:nth-child(3) { animation-delay: 0.12s; }
  .album:nth-child(4) { animation-delay: 0.16s; }
  .album:nth-child(5) { animation-delay: 0.20s; }
  .album:nth-child(6) { animation-delay: 0.24s; }
  .album:nth-child(7) { animation-delay: 0.28s; }
  .album:nth-child(8) { animation-delay: 0.32s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .cover-link {
    display: block; width: 191px; height: 191px;
    background: var(--placeholder); position: relative; overflow: hidden;
    transition: opacity 0.15s;
  }
  .cover-link:hover { opacity: 0.85; }
  .cover-link img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover-link.no-cover::after {
    content: 'cover unavailable';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 8px; text-align: center;
    font-size: 11px; color: var(--soft); letter-spacing: -0.01em;
  }

  .info { padding-top: 4px; min-width: 0; }
  .title-line { font-size: 18px; font-weight: 500; margin-bottom: 2px; letter-spacing: -0.005em; overflow-wrap: anywhere; }
  .meta {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px; color: var(--soft); margin-bottom: 14px; letter-spacing: -0.01em;
  }
  .note {
    font-size: 16px; color: var(--ink); line-height: 1.5; max-width: 540px;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
  }

  .links { margin-top: 14px; display: flex; gap: 20px; flex-wrap: wrap; }
  .link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 14px; color: var(--soft);
    text-decoration: underline; text-decoration-color: var(--link-underline);
    text-underline-offset: 3px; text-decoration-thickness: 1px;
    transition: color 0.15s, text-decoration-color 0.15s;
  }
  .link:hover { color: var(--ink); text-decoration-color: var(--ink); }
  .link .arrow { font-size: 11px; }
  .ic { width: 14px; height: 14px; fill: currentColor; flex: none; }

  .arch-group { margin-bottom: 8px; }
  .arch-month {
    font-size: 13px; font-weight: 500; color: var(--soft);
    margin: 40px 0 8px; letter-spacing: -0.005em;
  }

  #more { text-align: center; }

  .view-more {
    appearance: none; background: none; border: 1px solid var(--rule); border-radius: 2px;
    padding: 12px 20px; margin-top: 40px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 500; color: var(--ink);

  }
  .view-more:hover { border-color: var(--ink); }

  .empty { color: var(--soft); padding: 8px 0 24px; }

  footer { margin-top: 96px; padding-top: 24px; font-size: 14px; color: var(--soft); text-align: center; }
  footer a {

  footer a:hover { color: var(--ink); text-decoration-color: var(--ink); }
  .dot { margin: 0 8px; color: var(--link-underline); }

    body { padding: 24px 20px 64px; }
    .album { grid-template-columns: 127px 1fr; gap: 20px; padding: 24px 0; }
    .cover-link { width: 127px; height: 127px; }
    .links { gap: 16px; }
    .tabs { gap: 16px; }

</style>

const IC_SPOTIFY = '<svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.59 14.42a.62.62 0 01-.86.21c-2.35-1.44-5.31-1.76-8.79-.96a.62.62 0 11-.28-1.22c3.81-.87 7.08-.5 9.72 1.11.29.18.38.57.21.86zm1.22-2.72a.78.78 0 01-1.07.26c-2.69-1.66-6.79-2.13-9.99-1.16a.78.78 0 11-.45-1.49c3.65-1.11 8.16-.58 11.25 1.32.36.22.48.71.26 1.07zm.11-2.84C14.7 8.85 9.39 8.66 6.25 9.62a.94.94 0 11-.55-1.8c3.6-1.09 9.47-.88 13.21 1.34a.94.94 0 01-.96 1.61z"/></svg>';
const IC_APPLE = '<svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 17.5a2.5 2.5 0 11-2.5-2.5c.6 0 1.16.21 1.6.56V6l10-2v8.5a2.5 2.5 0 11-2.5-2.5c.6 0 1.16.21 1.6.56V6.2L9 8v9.5z"/></svg>';

const MONTH_INDEX = { jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11 };
const MONTH_LONG = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

let currentId = SOURCES[0].id;
const shownState = {};

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function searchUrl(base, artist, album) {
  return base + encodeURIComponent((artist + ' ' + album).trim());
}

function monthLabel(dateStr) {
  const parts = String(dateStr || '').trim().split(/\s+/);
  const mi = MONTH_INDEX[(parts[0] || '').slice(0, 3).toLowerCase()];
  if (mi === undefined) return String(dateStr || '');
  return `${MONTH_LONG[mi]} ${parts[1] || ''}`.trim();
}

function coverSrc(url) {
  if (!url) return '';
  if (url.indexOf('aquariumdrunkard.com') !== -1) {
    return 'https://images.weserv.nl/?url=' + encodeURIComponent(url.replace(/^https?:\/\//, '')) + '&w=400';
  }
  return url;
}

function cardHtml(a) {
  const title = a.artist
    ? `${escapeHtml(a.artist)} / ${escapeHtml(a.album)}`
    : escapeHtml(a.album || a.title || '');
  const alt = ((a.artist || '') + ' ' + (a.album || a.title || '')).trim();
  const src = coverSrc(a.cover);
  const cover = src ? `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" loading="lazy" onerror="this.style.display='none';var p=this.closest('.cover-link');if(p)p.classList.add('no-cover')">` : '';
  const coverClass = src ? 'cover-link' : 'cover-link no-cover';
  const coverHref = a.bandcamp || a.url || '#';
  const artist = a.artist || '';
  const album = a.album || a.title || '';
  const links = [];
  if (a.post) {
    if (a.url) links.push(`<a class="link" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">Read <span class="arrow">↗︎</span></a>`);
  } else {
  if (a.bandcamp) links.push(`<a class="link" href="${escapeHtml(a.bandcamp)}" target="_blank" rel="noopener">${IC_BANDCAMP}Bandcamp</a>`);
  if (a.url) links.push(`<a class="link" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">Source <span class="arrow">↗︎</span></a>`);
  links.push(`<a class="link" href="${escapeHtml(a.spotify || searchUrl('https://open.spotify.com/search/', artist, album))}" target="_blank" rel="noopener">${IC_SPOTIFY}Spotify</a>`);
  links.push(`<a class="link" href="${escapeHtml(a.apple || searchUrl('https://music.apple.com/search?term=', artist, album))}" target="_blank" rel="noopener">${IC_APPLE}Apple Music</a>`);
  }
  return `
    <article class="album">
      <a class="${coverClass}" href="${escapeHtml(coverHref)}" target="_blank" rel="noopener" aria-label="${escapeHtml(alt)}">${cover}</a>
      <div class="info">
        <div class="title-line">${title}</div>
        <div class="meta">${escapeHtml(a.date || '')}</div>
        <p class="note">${escapeHtml(a.note || '')}</p>
        <div class="links">${links.join('')}</div>
      </div>
    </article>`;
}

function formatUpdated(iso) {
  const d = new Date(iso);
  if (!iso || isNaN(d.getTime())) return '';
  const parts = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Europe/Amsterdam', day: 'numeric', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).formatToParts(d);
  const get = (t) => (parts.find((p) => p.type === t) || {}).value || '';
  return `Updated ${get('day')} ${get('month')} ${get('year')}, ${get('hour')}:${get('minute')} CET`;
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = SOURCES.map((s) =>
    `<button class="tab${s.id === currentId ? ' active' : ''}" data-id="${s.id}">${escapeHtml(s.label)}</button>`
  ).join('');
  tabs.querySelectorAll('.tab').forEach((b) => {
    b.addEventListener('click', () => { currentId = b.dataset.id; renderTabs(); render(); });
  });
}

function render() {
  const src = SOURCES.find((s) => s.id === currentId);
  const albums = src.albums || [];
  document.getElementById('intro').innerHTML = src.intro;

  const highlight = albums.slice(0, HIGHLIGHT_COUNT);
  const archiveAll = albums.slice(HIGHLIGHT_COUNT);
  const shown = shownState[src.id] || PAGE;
  const archiveVisible = archiveAll.slice(0, shown);

  document.getElementById('feed').innerHTML = highlight.length
    ? highlight.map(cardHtml).join('')
    : '<p class="empty">No entries yet. This tab fills in once its fetcher runs.</p>';

  const archiveTitle = document.getElementById('archive-title');
  const archiveEl = document.getElementById('archive');
  const moreWrap = document.getElementById('more');

  if (!archiveVisible.length) {
    archiveTitle.style.display = 'none';
    archiveEl.innerHTML = '';
    moreWrap.innerHTML = '';
    return;
  }

  archiveTitle.style.display = '';
  const groups = [];
  for (const a of archiveVisible) {
    const label = monthLabel(a.date);
    const last = groups[groups.length - 1];
    if (last && last.label === label) last.items.push(a);
    else groups.push({ label, items: [a] });
  }
  archiveEl.innerHTML = groups.map((g) => `
    <section class="arch-group">
      <div class="arch-month">${escapeHtml(g.label)}</div>
      <div class="feed">${g.items.map(cardHtml).join('')}</div>
    </section>
  `).join('');

  moreWrap.innerHTML = (shown < archiveAll.length)
    ? '<button class="view-more" id="viewMore">View 8 more</button>'
    : '';
  const btn = document.getElementById('viewMore');
  if (btn) btn.addEventListener('click', () => { shownState[src.id] = shown + PAGE; render(); });
}

renderTabs();
render();

(function showUpdated() {
  const t = formatUpdated(LAST_UPDATED);
  if (!t) return;
  const el = document.getElementById('updated');
  const wrap = document.getElementById('updated-wrap');
  if (el) el.textContent = t;
  if (wrap) wrap.hidden = false;
})();
</script>
</body>
</html>
